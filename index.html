<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strange website</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="black_screen ">
        <div class="wrapper p1">
            <h1 class="h1n1">Как вас зовут?</h1>
            <input class="i1" type="text" placeholder="Имя">
            <button class="b1">Далее</button>
        </div> 
        <div class="wrapper p2 dn">
            <h1 class="h1n2">Введите свою дату рождения</h1>
            <input class="i2" type="text" placeholder="дд.мм.гггг">
            <button class="b2">Далее</button>
        </div>
    </div>
    <div class="img_birth ">
        <div class="shadow">
            <div class="wrapper p3  ">
                <h1 class="h1n3">Поздравляю с днём рождения!</h1>
                <p>Поздравляю с днем рождения! Желаю тебе долго И счастливо жить и чтобы в жизни все было хорошо. Для того чтобы получить подарок нажми на кнопку </p>
                <button class="b3">Получить подарок</button>
            </div>
            <div class="wrapper p4 dn ">
                <h1 class="h1n3">Только сначала...</h1>
                <h1 class="class_winer dn">Иди бегом за подарком</h1>
                <p class="p1p4">Реши базовую математику</p>
                <p class="result"></p>
                <p class="math">5+3</p>
                <input type="text" class="i4">
                <button class="b4">Далее</button>
                
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
